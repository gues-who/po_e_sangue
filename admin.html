<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pó e Sangue — Painel do Mestre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="site-nav" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="ficha.html">Ficha</a>
        <a href="rolagens.html">Rolagens</a>
        <a href="habilidades.html">Habilidades</a>
        <a href="livro-jogador.html">Livro do jogador</a>
        <a href="login.html" class="nav-auth-link">Conta</a>
    </nav>

    <header class="page-header">
        <h1>Painel do Mestre</h1>
        <p class="quote">Fichas de todos os jogadores cadastrados.</p>
    </header>

    <!-- Estado: verificando auth -->
    <div id="adminVerificando" class="section" style="text-align:center;padding:32px;">
        <p>Verificando acesso…</p>
    </div>

    <!-- Estado: sem permissão -->
    <div id="adminNegado" class="section" hidden style="text-align:center;padding:32px;">
        <p style="color:var(--vermelho);font-size:1.1em;">Acesso negado.</p>
        <p>Este painel é restrito ao Mestre da campanha.</p>
        <a href="login.html" class="link-button" style="margin-top:16px;display:inline-block;">Entrar com outra conta</a>
    </div>

    <!-- Painel principal -->
    <div id="adminPanel" hidden>
        <div class="section" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
            <p style="margin:0;">Logado como mestre: <strong id="adminEmail"></strong></p>
            <button class="secondary" onclick="fazerLogout()" style="min-width:auto;padding:10px 18px;flex:none;">Sair</button>
        </div>

        <!-- Abas de navegação do painel -->
        <div class="admin-tabs">
            <button class="admin-tab admin-tab--active" id="abaFichas"
                    onclick="mostrarAba('fichas')">Fichas</button>
            <button class="admin-tab" id="abaRolagens"
                    onclick="mostrarAba('rolagens')">Histórico de Rolagens</button>
        </div>

        <!-- Fichas -->
        <div class="section" id="secaoFichas">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                <h2 style="margin:0;border:none;padding:0;">Fichas dos Jogadores</h2>
                <button onclick="recarregarFichas()" class="secondary"
                        style="min-width:auto;padding:10px 18px;flex:none;">↺ Atualizar</button>
            </div>
            <p id="adminStatus" class="note"></p>
            <div id="fichasLista"></div>
        </div>

        <!-- Histórico de Rolagens -->
        <div class="section" id="secaoRolagens" hidden>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                <h2 style="margin:0;border:none;padding:0;">Histórico de Rolagens</h2>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                    <select id="filtroJogador" onchange="filtrarRolagens()"
                            style="padding:8px 12px;font-size:0.82rem;min-width:160px;">
                        <option value="">Todos os jogadores</option>
                    </select>
                    <button onclick="recarregarRolagens()" class="secondary"
                            style="min-width:auto;padding:10px 18px;flex:none;">↺ Atualizar</button>
                </div>
            </div>
            <p id="rolagensStatus" class="note"></p>
            <div id="rolagensLista" class="hist-lista"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="admin.js"></script>
</body>
</html>
